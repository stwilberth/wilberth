<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente sutil -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Ventana de navegador principal -->
  <g id="browser-window">
    <!-- Sombra -->
    <rect x="205" y="205" width="790" height="540" fill="rgba(0,0,0,0.08)" rx="12"/>
    
    <!-- Ventana -->
    <rect x="200" y="200" width="790" height="540" fill="white" rx="12" stroke="#e0e0e0" stroke-width="2"/>
    
    <!-- Barra superior del navegador -->
    <rect x="200" y="200" width="790" height="50" fill="#0066cc" rx="12" />
    <rect x="200" y="235" width="790" height="15" fill="#0066cc"/>
    
    <!-- Botones del navegador -->
    <circle cx="230" cy="225" r="8" fill="#ffffff" opacity="0.9"/>
    <circle cx="255" cy="225" r="8" fill="#ffffff" opacity="0.9"/>
    <circle cx="280" cy="225" r="8" fill="#ffffff" opacity="0.9"/>
    
    <!-- Barra de dirección -->
    <rect x="320" y="215" width="400" height="20" fill="rgba(255,255,255,0.3)" rx="10"/>
    <text x="330" y="229" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.8">wilberth.com</text>
    
    <!-- Contenido de la ventana -->
    <rect x="220" y="270" width="750" height="450" fill="url(#screenGradient)"/>
    
    <!-- Líneas de código simuladas -->
    <g id="code-lines">
      <!-- Línea 1 -->
      <rect x="250" y="300" width="180" height="12" fill="#0066cc" opacity="0.3" rx="6"/>
      <rect x="440" y="300" width="120" height="12" fill="#0066cc" opacity="0.2" rx="6"/>
      
      <!-- Línea 2 -->
      <rect x="270" y="330" width="200" height="12" fill="#0066cc" opacity="0.25" rx="6"/>
      <rect x="480" y="330" width="100" height="12" fill="#0066cc" opacity="0.2" rx="6"/>
      
      <!-- Línea 3 -->
      <rect x="270" y="360" width="150" height="12" fill="#0066cc" opacity="0.3" rx="6"/>
      
      <!-- Línea 4 -->
      <rect x="250" y="390" width="220" height="12" fill="#0066cc" opacity="0.2" rx="6"/>
      <rect x="480" y="390" width="80" height="12" fill="#0066cc" opacity="0.25" rx="6"/>
      
      <!-- Sección visual -->
      <rect x="250" y="440" width="350" height="180" fill="white" stroke="#0066cc" stroke-width="2" opacity="0.4" rx="8"/>
      <rect x="270" y="460" width="100" height="8" fill="#0066cc" opacity="0.3" rx="4"/>
      <rect x="270" y="480" width="150" height="8" fill="#0066cc" opacity="0.2" rx="4"/>
      <rect x="270" y="500" width="120" height="8" fill="#0066cc" opacity="0.2" rx="4"/>
      
      <!-- Botón simulado -->
      <rect x="270" y="540" width="100" height="35" fill="#0066cc" opacity="0.6" rx="6"/>
    </g>
    
    <!-- Elementos laterales -->
    <g id="sidebar">
      <rect x="650" y="300" width="280" height="100" fill="white" stroke="#0066cc" stroke-width="2" opacity="0.4" rx="8"/>
      <rect x="670" y="320" width="60" height="60" fill="#0066cc" opacity="0.2" rx="4"/>
      <rect x="745" y="325" width="160" height="8" fill="#0066cc" opacity="0.25" rx="4"/>
      <rect x="745" y="345" width="120" height="8" fill="#0066cc" opacity="0.2" rx="4"/>
      <rect x="745" y="365" width="140" height="8" fill="#0066cc" opacity="0.2" rx="4"/>
      
      <rect x="650" y="420" width="280" height="100" fill="white" stroke="#0066cc" stroke-width="2" opacity="0.4" rx="8"/>
      <rect x="670" y="440" width="60" height="60" fill="#0066cc" opacity="0.2" rx="4"/>
      <rect x="745" y="445" width="160" height="8" fill="#0066cc" opacity="0.25" rx="4"/>
      <rect x="745" y="465" width="120" height="8" fill="#0066cc" opacity="0.2" rx="4"/>
      <rect x="745" y="485" width="140" height="8" fill="#0066cc" opacity="0.2" rx="4"/>
    </g>
  </g>
  
  <!-- Elementos decorativos flotantes -->
  <g id="floating-elements" opacity="0.6">
    <!-- Código bracket -->
    <text x="120" y="350" font-family="monospace" font-size="80" fill="#0066cc" opacity="0.15" font-weight="bold">&lt;/&gt;</text>
    
    <!-- Etiqueta HTML -->
    <text x="1020" y="400" font-family="monospace" font-size="60" fill="#0066cc" opacity="0.15" font-weight="bold">&lt;div&gt;</text>
    
    <!-- Punto decorativo -->
    <circle cx="150" cy="600" r="6" fill="#0066cc" opacity="0.3"/>
    <circle cx="1050" cy="250" r="8" fill="#0066cc" opacity="0.25"/>
    <circle cx="1080" cy="650" r="5" fill="#0066cc" opacity="0.3"/>
  </g>
  
  <!-- Líneas de conexión decorativas -->
  <g id="connection-lines" opacity="0.2">
    <line x1="150" y1="600" x2="200" y2="500" stroke="#0066cc" stroke-width="2"/>
    <line x1="1050" y1="250" x2="990" y2="280" stroke="#0066cc" stroke-width="2"/>
  </g>
</svg>