<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo moderno -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="screenGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Dispositivos mostrando la web -->
  <g id="devices">
    
    <!-- LAPTOP (principal - centro) -->
    <g id="laptop">
      <!-- Pantalla con sombra -->
      <rect x="305" y="185" width="600" height="380" fill="rgba(0,0,0,0.15)" rx="8"/>
      <rect x="300" y="180" width="600" height="380" fill="#1a1a1a" rx="8"/>
      
      <!-- Contenido de la pantalla -->
      <rect x="315" y="195" width="570" height="350" fill="url(#screenGlow)"/>
      
      <!-- Barra de navegador -->
      <rect x="315" y="195" width="570" height="35" fill="#0066cc" rx="4"/>
      <circle cx="335" cy="212" r="5" fill="white" opacity="0.8"/>
      <circle cx="355" cy="212" r="5" fill="white" opacity="0.8"/>
      <circle cx="375" cy="212" r="5" fill="white" opacity="0.8"/>
      <rect x="400" y="207" width="200" height="12" fill="rgba(255,255,255,0.3)" rx="6"/>
      <text x="410" y="217" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.9">tunegocio.com</text>
      
      <!-- Hero section de la web -->
      <rect x="330" y="245" width="250" height="140" fill="#0066cc" opacity="0.1" rx="6"/>
      <text x="455" y="285" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0066cc" text-anchor="middle">Tu Negocio</text>
      <text x="455" y="310" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Productos y servicios de calidad</text>
      <rect x="405" y="330" width="100" height="30" fill="#0066cc" rx="6"/>
      <text x="455" y="350" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">CONTÁCTANOS</text>
      
      <!-- Imagen placeholder -->
      <rect x="600" y="245" width="265" height="140" fill="white" stroke="#0066cc" stroke-width="2" opacity="0.4" rx="6"/>
      <circle cx="732" cy="315" r="20" fill="#0066cc" opacity="0.2"/>
      <rect x="700" y="325" width="65" height="4" fill="#0066cc" opacity="0.15" rx="2"/>
      <rect x="690" y="335" width="85" height="4" fill="#0066cc" opacity="0.15" rx="2"/>
      
      <!-- Sección de productos/servicios -->
      <g id="products-section">
        <rect x="330" y="405" width="150" height="120" fill="white" stroke="#e0e0e0" stroke-width="2" rx="6"/>
        <rect x="345" y="420" width="120" height="60" fill="#0066cc" opacity="0.1" rx="4"/>
        <text x="405" y="500" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#333" text-anchor="middle">Producto 1</text>
        <text x="405" y="515" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Desde $99</text>
        
        <rect x="495" y="405" width="150" height="120" fill="white" stroke="#e0e0e0" stroke-width="2" rx="6"/>
        <rect x="510" y="420" width="120" height="60" fill="#0066cc" opacity="0.1" rx="4"/>
        <text x="570" y="500" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#333" text-anchor="middle">Producto 2</text>
        <text x="570" y="515" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Desde $149</text>
        
        <rect x="660" y="405" width="150" height="120" fill="white" stroke="#e0e0e0" stroke-width="2" rx="6"/>
        <rect x="675" y="420" width="120" height="60" fill="#0066cc" opacity="0.1" rx="4"/>
        <text x="735" y="500" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#333" text-anchor="middle">Producto 3</text>
        <text x="735" y="515" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Desde $199</text>
      </g>
      
      <!-- Base del laptop -->
      <path d="M 250 560 L 300 560 L 320 585 L 880 585 L 900 560 L 950 560 L 970 600 L 230 600 Z" 
            fill="#c0c0c0"/>
      <rect x="550" y="585" width="100" height="15" fill="#999" rx="3"/>
    </g>
    
    <!-- TABLET (izquierda) -->
    <g id="tablet">
      <rect x="85" y="355" width="180" height="250" fill="rgba(0,0,0,0.15)" rx="12"/>
      <rect x="80" y="350" width="180" height="250" fill="#1a1a1a" rx="12"/>
      <rect x="90" y="365" width="160" height="220" fill="url(#screenGlow)"/>
      
      <!-- Contenido tablet -->
      <rect x="95" y="370" width="150" height="20" fill="#0066cc" rx="3"/>
      <circle cx="110" cy="380" r="3" fill="white" opacity="0.8"/>
      <circle cx="122" cy="380" r="3" fill="white" opacity="0.8"/>
      <circle cx="134" cy="380" r="3" fill="white" opacity="0.8"/>
      
      <rect x="100" y="400" width="140" height="70" fill="#0066cc" opacity="0.1" rx="4"/>
      <text x="170" y="425" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#0066cc" text-anchor="middle">Tu Marca</text>
      <text x="170" y="442" font-family="Arial, sans-serif" font-size="8" fill="#666" text-anchor="middle">Servicios profesionales</text>
      <rect x="138" y="453" width="64" height="15" fill="#0066cc" rx="3"/>
      <text x="170" y="463" font-family="Arial, sans-serif" font-size="7" font-weight="600" fill="white" text-anchor="middle">VER MÁS</text>
      
      <rect x="100" y="485" width="140" height="45" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
      <rect x="108" y="493" width="35" height="28" fill="#0066cc" opacity="0.1" rx="2"/>
      <text x="150" y="508" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="start">Servicio 1</text>
      <text x="150" y="518" font-family="Arial, sans-serif" font-size="6" fill="#666" text-anchor="start">Disponible</text>
      
      <rect x="100" y="540" width="140" height="45" fill="white" stroke="#e0e0e0" stroke-width="1" rx="4"/>
      <rect x="108" y="548" width="35" height="28" fill="#0066cc" opacity="0.1" rx="2"/>
      <text x="150" y="563" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="start">Servicio 2</text>
      <text x="150" y="573" font-family="Arial, sans-serif" font-size="6" fill="#666" text-anchor="start">Disponible</text>
      
      <circle cx="170" cy="593" r="4" fill="#666"/>
    </g>
    
    <!-- SMARTPHONE (derecha) -->
    <g id="smartphone">
      <rect x="945" y="305" width="120" height="240" fill="rgba(0,0,0,0.15)" rx="16"/>
      <rect x="940" y="300" width="120" height="240" fill="#1a1a1a" rx="16"/>
      <rect x="950" y="315" width="100" height="210" fill="url(#screenGlow)"/>
      
      <!-- Notch -->
      <rect x="980" y="310" width="40" height="8" fill="#1a1a1a" rx="4"/>
      
      <!-- Contenido móvil -->
      <rect x="955" y="320" width="90" height="15" fill="#0066cc" rx="2"/>
      <circle cx="965" cy="327" r="2" fill="white" opacity="0.8"/>
      <circle cx="973" cy="327" r="2" fill="white" opacity="0.8"/>
      <circle cx="981" cy="327" r="2" fill="white" opacity="0.8"/>
      
      <rect x="960" y="345" width="80" height="50" fill="#0066cc" opacity="0.1" rx="3"/>
      <text x="1000" y="365" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#0066cc" text-anchor="middle">Tu Web</text>
      <text x="1000" y="378" font-family="Arial, sans-serif" font-size="6" fill="#666" text-anchor="middle">Siempre accesible</text>
      <rect x="975" y="385" width="50" height="10" fill="#0066cc" rx="2"/>
      <text x="1000" y="392" font-family="Arial, sans-serif" font-size="6" fill="white" text-anchor="middle">LLAMAR</text>
      
      <rect x="960" y="405" width="80" height="30" fill="white" stroke="#e0e0e0" stroke-width="1" rx="3"/>
      <rect x="965" y="410" width="20" height="20" fill="#0066cc" opacity="0.1" rx="2"/>
      <text x="990" y="420" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#333" text-anchor="start">Contacto</text>
      <text x="990" y="428" font-family="Arial, sans-serif" font-size="5" fill="#666" text-anchor="start">📞 123-4567</text>
      
      <rect x="960" y="442" width="80" height="30" fill="white" stroke="#e0e0e0" stroke-width="1" rx="3"/>
      <rect x="965" y="447" width="20" height="20" fill="#0066cc" opacity="0.1" rx="2"/>
      <text x="990" y="457" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#333" text-anchor="start">Ubicación</text>
      <text x="990" y="465" font-family="Arial, sans-serif" font-size="5" fill="#666" text-anchor="start">📍 Ver mapa</text>
      
      <rect x="960" y="479" width="80" height="30" fill="white" stroke="#e0e0e0" stroke-width="1" rx="3"/>
      <rect x="965" y="484" width="20" height="20" fill="#0066cc" opacity="0.1" rx="2"/>
      <text x="990" y="494" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#333" text-anchor="start">Horario</text>
      <text x="990" y="502" font-family="Arial, sans-serif" font-size="5" fill="#666" text-anchor="start">🕐 Lun-Vie 9am</text>
      
      <rect x="985" y="520" width="30" height="3" fill="#666" rx="1.5"/>
    </g>
  </g>
  
  <!-- Elementos decorativos que muestran "resultados" -->
  <g id="results-indicators">
    <!-- Indicador de "En línea 24/7" -->
    <g id="online-badge">
      <rect x="480" y="90" width="240" height="50" fill="white" stroke="#00cc88" stroke-width="3" rx="25"/>
      <circle cx="510" cy="115" r="8" fill="#00cc88"/>
      <text x="535" y="120" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#00cc88">Tu Web Online 24/7</text>
    </g>
    
    <!-- Indicador de "Clientes pueden encontrarte" -->
    <g id="findable-badge">
      <rect x="130" y="650" width="200" height="45" fill="white" stroke="#0066cc" stroke-width="3" rx="22"/>
      <text x="230" y="665" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#666" text-anchor="middle">🔍 Clientes te encuentran</text>
      <text x="230" y="682" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#0066cc" text-anchor="middle">en Google</text>
    </g>
    
    <!-- Indicador de "Responsive" -->
    <g id="responsive-badge">
      <rect x="870" y="600" width="180" height="45" fill="white" stroke="#a29bfe" stroke-width="3" rx="22"/>
      <text x="960" y="616" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#666" text-anchor="middle">📱 Se adapta a todos</text>
      <text x="960" y="633" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#a29bfe" text-anchor="middle">los dispositivos</text>
    </g>
    
    <!-- Indicador de "Profesional" -->
    <g id="professional-badge">
      <circle cx="1100" cy="200" r="50" fill="white" stroke="#ffd93d" stroke-width="3"/>
      <text x="1100" y="200" font-family="Arial, sans-serif" font-size="35" text-anchor="middle">✨</text>
      <text x="1100" y="225" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#f6b93b" text-anchor="middle">Imagen</text>
      <text x="1100" y="238" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#666" text-anchor="middle">Profesional</text>
    </g>
    
    <!-- Estadística de ventas -->
    <g id="sales-indicator">
      <rect x="70" y="180" width="150" height="100" fill="white" stroke="#00cc88" stroke-width="3" rx="12"/>
      <text x="145" y="210" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#00cc88" text-anchor="middle">+340%</text>
      <text x="145" y="235" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#666" text-anchor="middle">Más contactos</text>
      <text x="145" y="252" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">con tu web</text>
      <text x="145" y="270" font-family="Arial, sans-serif" font-size="18" text-anchor="middle">📈</text>
    </g>
  </g>
  
  <!-- Flechas decorativas conectando beneficios -->
  <path d="M 220 235 Q 260 250 300 280" stroke="#00cc88" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.4"/>
  <path d="M 600 140 Q 600 160 550 180" stroke="#00cc88" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.4"/>
  <path d="M 1050 200 Q 1000 220 950 270" stroke="#ffd93d" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.4"/>
</svg>